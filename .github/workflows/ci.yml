# Continuous integration — runs typecheck, tests, and the build on
# every push and pull request. Node 18 matches the project's `engines`
# field in package.json; the matrix also covers Node 20 (current LTS)
# and Node 22 so regressions against newer runtimes surface early.
#
# The project is strict about dependencies: zero runtime deps, only
# typescript + @types/node as devDeps. `npm ci` is therefore fast and
# this workflow stays under ~60 seconds per job.
#
# Live smoke of the generated dashboard is deliberately NOT in CI —
# it requires the test/Health_and_Safety.Report fixture which is
# user-supplied (not all forks have it). Local developers can still
# run `node dist/app.js test/Health_and_Safety.Report` manually.

name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-flight run if the same PR pushes again — no point
# finishing tests on the old SHA.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dist/ populated
        run: |
          test -f dist/app.js || (echo "dist/app.js missing"; exit 1)
          test -f dist/client/main.js || (echo "dist/client/main.js missing"; exit 1)
          test -f dist/client/render/md.js || (echo "dist/client/render/md.js missing"; exit 1)

      # Build the browser bundle + run a size regression check. The
      # cap was bumped 300 KB → 400 KB in the lite/detailed PR — the
      # bake-both approach doubles the per-doc MD payload (worth it
      # to land both modes without an architectural carve to lazy
      # client-side generation). Current bundle ~310 KB; cap leaves
      # ~30% headroom for organic growth from real features.
      #
      # The cap check runs on every matrix row so regressions surface
      # immediately.
      - name: Build browser bundle
        run: npm run build:browser

      - name: Bundle-size guard (docs/index.html)
        run: |
          size=$(wc -c < docs/index.html)
          cap=400000
          echo "docs/index.html: $size bytes (cap $cap)"
          if [ "$size" -gt "$cap" ]; then
            echo "::error::Bundle exceeds cap — refactor or bump the cap deliberately"
            exit 1
          fi
